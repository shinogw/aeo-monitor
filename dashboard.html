<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEO Monitor - ダッシュボード</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 1.8rem; margin-bottom: 8px; }
.subtitle { color: #94a3b8; margin-bottom: 24px; }
.meta { display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
.meta-item { background: #1e293b; padding: 16px 24px; border-radius: 12px; min-width: 150px; }
.meta-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
.meta-value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
.meta-value.highlight { color: #38bdf8; }

.section { margin-bottom: 32px; }
.section h2 { font-size: 1.2rem; margin-bottom: 16px; color: #94a3b8; }

.brand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.brand-card { background: #1e293b; border-radius: 12px; padding: 20px; border-left: 4px solid #334155; }
.brand-card.target { border-left-color: #f59e0b; }
.brand-card.top { border-left-color: #22c55e; }
.brand-name { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 9999px; background: #334155; }
.badge.target { background: #92400e; color: #fbbf24; }
.rate-container { margin-top: 12px; }
.rate-bar-bg { background: #334155; border-radius: 8px; height: 24px; overflow: hidden; }
.rate-bar { height: 100%; border-radius: 8px; display: flex; align-items: center; padding-left: 8px; font-size: 0.8rem; font-weight: 600; min-width: 40px; transition: width 1s ease; }
.rate-bar.high { background: linear-gradient(90deg, #22c55e, #16a34a); }
.rate-bar.mid { background: linear-gradient(90deg, #eab308, #ca8a04); }
.rate-bar.low { background: linear-gradient(90deg, #ef4444, #dc2626); }
.rate-bar.zero { background: #475569; }
.rate-text { margin-top: 6px; font-size: 0.8rem; color: #64748b; }

.query-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.query-table th, .query-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #1e293b; }
.query-table th { color: #64748b; font-size: 0.75rem; text-transform: uppercase; background: #1e293b; }
.query-table tr:hover { background: #1e293b; }
.mention-yes { color: #22c55e; }
.mention-no { color: #ef4444; }

.recommendations { background: #1e293b; border-radius: 12px; padding: 20px; }
.rec-item { padding: 8px 0; border-bottom: 1px solid #334155; }
.rec-item:last-child { border-bottom: none; }
.rec-icon { margin-right: 8px; }

.footer { margin-top: 40px; text-align: center; color: #475569; font-size: 0.8rem; }
.upload-area { background: #1e293b; border: 2px dashed #334155; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; margin-bottom: 32px; }
.upload-area:hover { border-color: #38bdf8; }
.upload-area input { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 AEO Monitor</h1>
  <p class="subtitle">AI検索エンジン最適化モニタリング</p>
  
  <div id="upload-section" class="upload-area" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept=".json" onchange="loadFile(event)">
    <p>📁 dashboard-latest.json をドラッグ＆ドロップ、またはクリックして選択</p>
    <p style="color:#64748b;margin-top:8px;font-size:0.85rem">data/dashboard-latest.json を読み込みます</p>
  </div>

  <div id="dashboard" style="display:none">
    <div class="meta" id="meta-cards"></div>
    
    <div class="section">
      <h2>🏆 ブランド言及ランキング</h2>
      <div class="brand-grid" id="brand-grid"></div>
    </div>

    <div class="section">
      <h2>📝 質問別マトリクス</h2>
      <div style="overflow-x:auto">
        <table class="query-table" id="query-table"></table>
      </div>
    </div>

    <div class="section">
      <h2>💡 改善提案</h2>
      <div class="recommendations" id="recommendations"></div>
    </div>

    <div class="section" id="advice-section" style="display:none">
      <h2>🤖 AI改善提案</h2>
      <div class="recommendations" id="advice" style="white-space:pre-wrap;line-height:1.7;font-size:0.9rem"></div>
    </div>

    <div class="footer">
      <p>Generated by AEO Monitor MVP | <span id="gen-time"></span></p>
    </div>
  </div>
</div>

<script>
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      renderDashboard(data);
    } catch(err) {
      alert('JSONの読み込みに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// Drag and drop
const uploadArea = document.getElementById('upload-section');
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#38bdf8'; });
uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#334155'; });
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.style.borderColor = '#334155';
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try { renderDashboard(JSON.parse(ev.target.result)); }
      catch(err) { alert('Error: ' + err.message); }
    };
    reader.readAsText(file);
  }
});

function renderDashboard(data) {
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  
  // Meta cards
  const avgRate = data.brands.length > 0 
    ? (data.brands.reduce((s, b) => s + b.mention_rate, 0) / data.brands.length).toFixed(1)
    : 0;
  const targetBrands = data.brands.filter(b => b.is_target);
  const targetRate = targetBrands.length > 0 
    ? (targetBrands.reduce((s, b) => s + b.mention_rate, 0) / targetBrands.length).toFixed(1) 
    : 0;
  
  document.getElementById('meta-cards').innerHTML = `
    <div class="meta-item"><div class="meta-label">クライアント</div><div class="meta-value">${data.client}</div></div>
    <div class="meta-item"><div class="meta-label">業種 / 地域</div><div class="meta-value">${data.industry} / ${data.region}</div></div>
    <div class="meta-item"><div class="meta-label">自社 言及率</div><div class="meta-value highlight">${targetRate}%</div></div>
    <div class="meta-item"><div class="meta-label">平均言及率</div><div class="meta-value">${avgRate}%</div></div>
    <div class="meta-item"><div class="meta-label">総クエリ数</div><div class="meta-value">${data.total_queries}</div></div>
  `;
  
  // Brand cards
  const maxRate = Math.max(...data.brands.map(b => b.mention_rate), 1);
  document.getElementById('brand-grid').innerHTML = data.brands.map((b, i) => {
    const cls = b.is_target ? 'target' : (i === 0 ? 'top' : '');
    const barCls = b.mention_rate >= 50 ? 'high' : b.mention_rate >= 20 ? 'mid' : b.mention_rate > 0 ? 'low' : 'zero';
    const width = Math.max(b.mention_rate, 3);
    return `
      <div class="brand-card ${cls}">
        <div class="brand-name">
          ${b.is_target ? '🎯' : '🏢'} ${b.name}
          ${b.is_target ? '<span class="badge target">自社</span>' : ''}
        </div>
        <div class="rate-container">
          <div class="rate-bar-bg">
            <div class="rate-bar ${barCls}" style="width:${width}%">${b.mention_rate}%</div>
          </div>
          <div class="rate-text">${b.mentioned}/${b.total} 回言及</div>
        </div>
      </div>
    `;
  }).join('');
  
  // Query matrix table
  let tableHTML = '<thead><tr><th>質問</th>';
  data.brands.forEach(b => { tableHTML += `<th>${b.is_target ? '🎯' : ''} ${b.name.slice(0,8)}</th>`; });
  tableHTML += '</tr></thead><tbody>';
  
  data.queries.forEach(q => {
    tableHTML += `<tr><td style="max-width:300px;font-size:0.85rem">${q}</td>`;
    data.brands.forEach(b => {
      const qd = b.by_query[q];
      if (qd) {
        const cls = qd.rate > 0 ? 'mention-yes' : 'mention-no';
        tableHTML += `<td class="${cls}">${qd.rate > 0 ? '✅' : '❌'} ${qd.rate}%</td>`;
      } else {
        tableHTML += '<td>-</td>';
      }
    });
    tableHTML += '</tr>';
  });
  tableHTML += '</tbody>';
  document.getElementById('query-table').innerHTML = tableHTML;
  
  // Recommendations
  const recs = [];
  targetBrands.forEach(b => {
    if (b.mention_rate === 0) recs.push(`<div class="rec-item"><span class="rec-icon">🔴</span><strong>${b.name}</strong>: AI検索で全く推薦されていません。構造化データ整備・権威性コンテンツ作成が急務です。</div>`);
    else if (b.mention_rate < 30) recs.push(`<div class="rec-item"><span class="rec-icon">🟡</span><strong>${b.name}</strong>: 言及率${b.mention_rate}%。外部言及の増加とFAQ整備で改善可能です。</div>`);
    else recs.push(`<div class="rec-item"><span class="rec-icon">🟢</span><strong>${b.name}</strong>: 言及率${b.mention_rate}%。良好です。維持・拡大を継続してください。</div>`);
  });
  
  const compBrands = data.brands.filter(b => !b.is_target);
  if (compBrands.length > 0) {
    const top = compBrands[0];
    recs.push(`<div class="rec-item"><span class="rec-icon">📊</span>競合トップ: <strong>${top.name}</strong> (${top.mention_rate}%) — このレベルを目標にしましょう。</div>`);
  }
  
  document.getElementById('recommendations').innerHTML = recs.join('');
  document.getElementById('gen-time').textContent = new Date(data.generated_at).toLocaleString('ja-JP');
  
  // Advice section
  if (data.advice) {
    document.getElementById('advice-section').style.display = 'block';
    document.getElementById('advice').textContent = data.advice;
  }
}
</script>
</body>
</html>
