<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断結果 — AEO Monitor Japan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="nav scrolled">
  <div class="container nav-inner">
    <a href="/"><img src="/static/logo.svg" alt="AEO Monitor" class="nav-logo"></a>
    <a href="/#diagnosis" class="nav-cta">もう一度診断する</a>
  </div>
</nav>

<section class="results-hero" id="resultsArea">
  <div class="container text-center">
    <span class="section-label">診断結果</span>
    <h1 class="section-title" id="resultTitle" style="margin-bottom:8px">読み込み中...</h1>
    <p class="section-desc" id="resultSub"></p>
    <div class="score-ring" id="scoreRing">
      <div class="score-grade" id="scoreGrade">-</div>
      <div class="score-label">総合評価</div>
    </div>
    <p style="font-size:.9rem;color:var(--gray-500)" id="mentionRate"></p>
  </div>
</section>

<section style="padding:0 0 80px">
  <div class="container" style="max-width:800px">
    <!-- Query Results -->
    <div id="queryResults"></div>

    <!-- Competitors -->
    <div class="result-card" id="competitorCard" style="display:none">
      <h3>🏢 AI検索で推薦されている競合</h3>
      <ul class="competitor-list" id="competitorList"></ul>
    </div>

    <!-- Advice -->
    <div class="result-card" id="adviceCard" style="display:none">
      <h3>💡 改善提案</h3>
      <div id="adviceContent" style="font-size:.95rem;line-height:1.8;color:var(--gray-600)"></div>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:32px;justify-content:center">
      <button class="btn-pdf" id="pdfBtn" onclick="downloadPdf()">📄 PDFレポートをダウンロード</button>
      <a href="/" class="btn-back">← トップに戻る</a>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container footer-inner">
    <img src="/static/logo.svg" alt="AEO Monitor" class="footer-logo">
    <p>© 2025 AEO Monitor Japan. All rights reserved.</p>
  </div>
</footer>

<script>
const data = JSON.parse(sessionStorage.getItem('diagnosisResult') || 'null');

if (!data) {
  document.getElementById('resultTitle').textContent = 'データがありません';
  document.getElementById('resultSub').textContent = 'トップページから診断を実行してください。';
} else {
  render(data);
}

function render(d) {
  document.getElementById('resultTitle').textContent = d.business_name + ' の診断結果';
  document.getElementById('resultSub').textContent = d.industry + ' / ' + d.area;
  
  const rate = d.mention_rate || 0;
  let grade, cls;
  if (rate >= 80) { grade = 'A'; cls = 'grade-a'; }
  else if (rate >= 60) { grade = 'B'; cls = 'grade-b'; }
  else if (rate >= 40) { grade = 'C'; cls = 'grade-c'; }
  else if (rate >= 20) { grade = 'D'; cls = 'grade-d'; }
  else { grade = 'F'; cls = 'grade-f'; }
  
  document.getElementById('scoreGrade').textContent = grade;
  document.getElementById('scoreRing').classList.add(cls);
  document.getElementById('mentionRate').textContent = `ブランド言及率: ${rate}%（${d.mentioned_count || 0} / ${d.total_queries || 0} クエリ）`;

  // Query results
  const container = document.getElementById('queryResults');
  (d.query_results || []).forEach(qr => {
    const card = document.createElement('div');
    card.className = 'result-card';
    const mentioned = qr.mentioned ? '<span class="mention-badge yes">✅ 言及あり</span>' : '<span class="mention-badge no">❌ 言及なし</span>';
    
    let sourcesHtml = '';
    if (qr.sources && qr.sources.length) {
      sourcesHtml = '<div style="margin-top:12px"><strong style="font-size:.85rem">引用ソース:</strong><ul style="margin-top:4px;padding-left:20px;font-size:.85rem;color:var(--gray-500)">' +
        qr.sources.map(s => `<li>${s}</li>`).join('') + '</ul></div>';
    }
    
    card.innerHTML = `
      <h3>🔍 「${qr.query}」</h3>
      <div style="margin-bottom:12px">${mentioned}</div>
      <div style="font-size:.9rem;color:var(--gray-600);background:var(--gray-50);padding:16px;border-radius:8px;max-height:200px;overflow-y:auto;line-height:1.7">${escapeHtml(qr.response || '').replace(/\n/g, '<br>')}</div>
      ${sourcesHtml}
    `;
    container.appendChild(card);
  });

  // Competitors
  if (d.competitors && d.competitors.length) {
    document.getElementById('competitorCard').style.display = '';
    const list = document.getElementById('competitorList');
    d.competitors.forEach(c => {
      const li = document.createElement('li');
      li.innerHTML = `<span>${c.name}</span><span style="color:var(--gray-400)">${c.mentions || 0}回言及</span>`;
      list.appendChild(li);
    });
  }

  // Advice
  if (d.advice) {
    document.getElementById('adviceCard').style.display = '';
    document.getElementById('adviceContent').innerHTML = d.advice.replace(/\n/g, '<br>');
  }
}

function escapeHtml(t) {
  const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
}

async function downloadPdf() {
  if (!data || !data.diagnosis_id) return;
  const btn = document.getElementById('pdfBtn');
  btn.disabled = true; btn.textContent = '📄 生成中...';
  try {
    const resp = await fetch('/api/pdf/' + data.diagnosis_id);
    if (!resp.ok) throw new Error('PDF生成に失敗しました');
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `AEO診断レポート_${data.business_name}.pdf`;
    a.click(); URL.revokeObjectURL(url);
  } catch (e) { alert(e.message); }
  btn.disabled = false; btn.textContent = '📄 PDFレポートをダウンロード';
}
</script>
</body>
</html>
